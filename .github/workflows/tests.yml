name: Tests

on:
  pull_request:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  pytest:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libegl1 \
            libgl1 \
            libxkbcommon-x11-0 \
            libxcb-cursor0 \
            libxcb-icccm4 \
            libxcb-image0 \
            libxcb-keysyms1 \
            libxcb-randr0 \
            libxcb-render-util0 \
            libxcb-shape0 \
            libxcb-xfixes0 \
            libxcb-xinerama0 \
            xvfb

      - name: Install Python dependencies
        run: uv sync --all-extras --group dev --frozen

      - name: Install ClickPoints examples
        run: |
          mkdir -p "$HOME/.clickpoints/test"
          git clone --depth 1 https://github.com/fabrylab/clickpointsexamples "$HOME/.clickpoints/test/ClickPointsExamples"

      - name: Run tests
        env:
          QT_QPA_PLATFORM: xcb
        run: xvfb-run -a uv run pytest
